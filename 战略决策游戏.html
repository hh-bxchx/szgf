<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战争策略大师</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2C1810, #8B4513, #2C1810);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 粒子背景 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.7);
            animation: float 20s infinite linear;
            box-shadow: 0 0 15px rgba(255, 165, 0, 0.6);
        }
        
        @keyframes float {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 215, 0, 0.15);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
            z-index: 1000;
            border: none;
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: rgba(255, 165, 0, 0.25);
            transform: translateX(-5px);
        }

        .header {
            text-align: center;
            padding: 80px 0 40px;
            margin-bottom: 30px;
            position: relative;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 20px 0;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
            background: linear-gradient(to right, #FFD700, #FFA500, #DC143C);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: titleGlow 2s infinite alternate;
        }

        @keyframes titleGlow {
            0% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
            100% { text-shadow: 0 0 25px rgba(255, 165, 0, 0.8); }
        }

        .header p {
            font-size: 1.3rem;
            color: #FFE4B5;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .game-info {
            display: grid;
            grid-template-columns: 1fr 200px 1fr;
            gap: 20px;
            margin-bottom: 30px;
            align-items: center;
        }

        .player-info {
            background: rgba(255, 215, 0, 0.08);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.3);
        }

        .player-info h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #FFD700;
        }

        .score {
            font-size: 2em;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .vs-section {
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding: 15px;
            background-color: rgba(255, 215, 0, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .strategies-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .strategy-card {
            background: rgba(255, 215, 0, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.3);
        }

        .strategy-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent);
            transition: left 0.5s;
        }

        .strategy-card:hover::before {
            left: 100%;
        }

        .strategy-card:hover {
            transform: translateY(-5px);
            border-color: #FFD700;
            box-shadow: 0 15px 35px rgba(255, 215, 0, 0.3);
        }

        .strategy-card.available {
            border-color: #6bcf7f;
            background: rgba(107, 207, 127, 0.15);
        }

        .strategy-card.unavailable {
            opacity: 0.5;
            cursor: not-allowed;
            background: rgba(255, 107, 107, 0.15);
        }

        .strategy-card.selected-player {
            border-color: #FFD700;
            background: rgba(255, 217, 61, 0.2);
        }

        .strategy-card.selected-ai {
            border-color: #DC143C;
            background: rgba(220, 20, 60, 0.2);
        }

        .strategy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .strategy-name {
            font-weight: bold;
            font-size: 1.2em;
            color: #FFD700;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        .strategy-score {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em;
            color: white;
            box-shadow: 0 2px 10px rgba(255, 165, 0, 0.4);
        }

        .strategy-description {
            color: #FFE4B5;
            font-size: 0.95em;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .strategy-dependencies {
            font-size: 0.85em;
            color: #FFA500;
            background: rgba(255, 165, 0, 0.1);
            padding: 8px;
            border-radius: 8px;
            border-left: 3px solid #FFA500;
        }

        .control-panel {
            text-align: center;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            border: none;
            padding: 15px 35px;
            border-radius: 25px;
            color: white;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            margin: 0 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: linear-gradient(45deg, #FFA500, #FF8C00);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .game-log {
            background: rgba(255, 215, 0, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 25px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.3);
        }

        .game-log h3 {
            color: #FFD700;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .log-entry {
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 4px solid #FFD700;
            background: rgba(255, 215, 0, 0.1);
            color: #FFE4B5;
        }

        .turn-indicator {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            color: #FFD700;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(20px);
            margin: 15% auto;
            padding: 40px;
            border-radius: 20px;
            width: 80%;
            max-width: 600px;
            text-align: center;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-content h2 {
            color: #FFD700;
            margin-bottom: 20px;
            font-size: 2.2em;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .selected-strategies {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .selected-list {
            background: rgba(255, 215, 0, 0.08);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.3);
        }

        .selected-list h4 {
            margin-bottom: 15px;
            color: #FFD700;
            font-size: 1.2em;
        }

        .selected-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            margin-bottom: 8px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            color: #FFE4B5;
        }

        /* 战前准备阶段样式 */
        .pre-battle-modal .modal-content {
            max-width: 700px;
            padding: 40px;
        }

        .battle-events {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
        }

        .battle-event {
            background: rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .battle-event:hover {
            border-color: #FFD700;
            background: rgba(255, 215, 0, 0.2);
        }

        .battle-event.active {
            border-color: #FFD700;
            background: rgba(255, 217, 61, 0.3);
            animation: pulse 1s infinite;
        }

        .battle-event.winner {
            border-color: #6bcf7f;
            background: rgba(107, 207, 127, 0.3);
            transform: scale(1.1);
        }

        .battle-event-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
            display: block;
        }

        .battle-event-name {
            font-weight: bold;
            margin-bottom: 5px;
            color: #FFD700;
        }

        .battle-event-desc {
            font-size: 0.9em;
            color: #FFE4B5;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .random-selection-area {
            background: rgba(255, 215, 0, 0.08);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            border: 2px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .random-selection-area h3 {
            color: #FFD700;
            margin-bottom: 15px;
        }

        .random-progress {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .random-progress-bar {
            height: 100%;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .first-turn-indicator {
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #FFD700;
            backdrop-filter: blur(10px);
        }

        .first-turn-indicator h3 {
            color: #FFD700;
            margin-bottom: 10px;
        }

        .first-turn-indicator p {
            color: #FFE4B5;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-info {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .vs-section {
                order: -1;
            }
            
            .strategies-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .selected-strategies {
                grid-template-columns: 1fr;
            }
            
            .battle-events {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2.5rem;
            }
            
            .btn {
                font-size: 1rem;
                padding: 12px 25px;
            }
        }

        #aiThinking {
            color: #FFD700;
            font-size: 1.1em;
            margin-top: 15px;
        }

        /* 错误提示样式 */
        .error-message {
            background: rgba(220, 20, 60, 0.15);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            color: #FFB6C1;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- 粒子背景 -->
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <!-- 返回按钮 -->
        <a href="休闲空间.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> 返回休闲空间
        </a>

        <div class="header">
            <h1>⚔️ 战争策略大师 ⚔️</h1>
            <p>与AI进行终极战略对决，选择你的战术，征服战场！</p>
        </div>

        <div class="game-info">
            <div class="player-info">
                <h3><i class="fas fa-user"></i> 玩家</h3>
                <div class="score" id="playerScore">0</div>
                <div>已选择: <span id="playerCount">0</span>/6</div>
            </div>
            
            <div class="vs-section">
                <div>VS</div>
                <div id="turnIndicator">游戏开始</div>
            </div>
            
            <div class="player-info">
                <h3><i class="fas fa-robot"></i> AI对手</h3>
                <div class="score" id="aiScore">0</div>
                <div>已选择: <span id="aiCount">0</span>/6</div>
            </div>
        </div>

        <div class="selected-strategies">
            <div class="selected-list">
                <h4><i class="fas fa-star"></i> 玩家已选策略</h4>
                <div id="playerSelected"></div>
            </div>
            <div class="selected-list">
                <h4><i class="fas fa-cog"></i> AI已选策略</h4>
                <div id="aiSelected"></div>
            </div>
        </div>

        <div class="control-panel">
            <button class="btn" onclick="startGame()">
                <i class="fas fa-play"></i> 开始游戏
            </button>
            <button class="btn" onclick="resetGame()">
                <i class="fas fa-redo"></i> 重新开始
            </button>
            <div id="aiThinking" style="display: none;">
                <i class="fas fa-brain"></i> AI正在思考策略<span class="loading"></span>
            </div>
        </div>

        <div id="strategiesContainer" class="strategies-container"></div>

        <div class="game-log">
            <h3><i class="fas fa-scroll"></i> 游戏日志</h3>
            <div id="gameLog"></div>
        </div>
    </div>

    <!-- 战前准备模态框 -->
    <div id="preBattleModal" class="modal pre-battle-modal">
        <div class="modal-content">
            <h2><i class="fas fa-crosshairs"></i> 战前准备阶段</h2>
            <p>双方正在进行战前侦察和准备工作，获胜方将获得先手优势！</p>
            
            <div class="random-selection-area">
                <h3><i class="fas fa-search"></i> 情报争夺战</h3>
                <div class="battle-events">
                    <div class="battle-event" data-event="scout">
                        <span class="battle-event-icon">🔭</span>
                        <div class="battle-event-name">侦察行动</div>
                        <div class="battle-event-desc">派遣侦察兵收集情报</div>
                    </div>
                    <div class="battle-event" data-event="air">
                        <span class="battle-event-icon">✈️</span>
                        <div class="battle-event-name">制空权</div>
                        <div class="battle-event-desc">争夺天空控制权</div>
                    </div>
                    <div class="battle-event" data-event="intel">
                        <span class="battle-event-icon">📡</span>
                        <div class="battle-event-name">情报战</div>
                        <div class="battle-event-desc">破译敌方通信</div>
                    </div>
                </div>
                
                <div class="random-progress">
                    <div class="random-progress-bar" id="randomProgress"></div>
                </div>
                
                <div id="randomResult" style="display: none;">
                    <div class="first-turn-indicator">
                        <h3 id="winnerTitle"></h3>
                        <p id="winnerDesc"></p>
                    </div>
                    <button class="btn" onclick="startBattlePhase()">
                        <i class="fas fa-swords"></i> 开始战斗
                    </button>
                </div>
                
                <button class="btn" id="startRandomBtn" onclick="startRandomSelection()">
                    <i class="fas fa-dice"></i> 开始争夺
                </button>
            </div>
        </div>
    </div>

    <!-- 游戏结束模态框 -->
    <div id="gameEndModal" class="modal">
        <div class="modal-content">
            <h2 id="gameResult"></h2>
            <div id="finalScores"></div>
            <button class="btn" onclick="resetGame(); closeModal();">
                <i class="fas fa-play"></i> 再来一局
            </button>
        </div>
    </div>

    <script>
        // 创建粒子背景
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 40;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // 随机属性
                const size = Math.random() * 20 + 8;
                const posX = Math.random() * 100;
                const posY = Math.random() * 100 + 100;
                const animationDuration = Math.random() * 25 + 15;
                const animationDelay = Math.random() * 10;
                const opacity = Math.random() * 0.5 + 0.2;
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${posX}%`;
                particle.style.top = `${posY}%`;
                particle.style.animationDuration = `${animationDuration}s`;
                particle.style.animationDelay = `-${animationDelay}s`;
                particle.style.opacity = opacity;
                
                particlesContainer.appendChild(particle);
            }
        }

        // 战前准备事件配置
        const battleEvents = [
            {
                id: 'scout',
                name: '侦察行动',
                icon: '🔭',
                description: '派遣侦察兵深入敌后，收集关键情报',
                playerWinDesc: '你的侦察兵成功获取了敌方部署信息，获得先手优势！',
                aiWinDesc: '敌方侦察更加出色，AI获得了宝贵的先手机会！'
            },
            {
                id: 'air',
                name: '制空权争夺',
                icon: '✈️',
                description: '双方空军激烈交战，争夺天空控制权',
                playerWinDesc: '你的空军表现出色，掌控制空权，获得战术先机！',
                aiWinDesc: 'AI的空中力量更胜一筹，夺得制空权和首攻机会！'
            },
            {
                id: 'intel',
                name: '情报战',
                icon: '📡',
                description: '电子战专家破译敌方通信密码',
                playerWinDesc: '你成功破解了敌方通信，掌握了战场主动权！',
                aiWinDesc: 'AI率先破译了你的通信密码，获得了先手优势！'
            }
        ];

        // 战争策略定义 - 新增了两个策略
        const strategies = [
            {
                id: 1,
                name: "侦察部署",
                score: 1,
                description: "派遣侦察兵收集敌方情报，为后续作战奠定基础",
                dependencies: [],
                unlocks: [3, 8]
            },
            {
                id: 2,
                name: "后勤补给",
                score: 2,
                description: "建立稳固的补给线，确保部队持续作战能力",
                dependencies: [],
                unlocks: [6, 9]
            },
            {
                id: 3,
                name: "空中轰炸",
                score: 8,
                description: "发动大规模空袭，重创敌方防御设施",
                dependencies: [1],
                unlocks: [12]
            },
            {
                id: 4,
                name: "装甲突击",
                score: 6,
                description: "集中坦克部队实施快速突破",
                dependencies: [],
                unlocks: [7]
            },
            {
                id: 5,
                name: "海军封锁",
                score: 4,
                description: "控制海上通道，切断敌方海上补给",
                dependencies: [],
                unlocks: []
            },
            {
                id: 6,
                name: "特种作战",
                score: 7,
                description: "派遣特种部队执行秘密任务",
                dependencies: [2],
                unlocks: []
            },
            {
                id: 7,
                name: "城市围攻",
                score: 9,
                description: "包围并攻克敌方重要城市",
                dependencies: [4],
                unlocks: []
            },
            {
                id: 8,
                name: "电子战",
                score: 5,
                description: "干扰敌方通信和指挥系统",
                dependencies: [1],
                unlocks: [11]
            },
            {
                id: 9,
                name: "心理战",
                score: 3,
                description: "通过宣传攻势瓦解敌方士气",
                dependencies: [2],
                unlocks: [10]
            },
            {
                id: 10,
                name: "同盟协作",
                score: 4,
                description: "与友军建立联盟，共享情报和资源",
                dependencies: [9],
                unlocks: []
            },
            {
                id: 11,
                name: "网络攻击",
                score: 5,
                description: "发动大规模网络攻击，瘫痪敌方数字基础设施",
                dependencies: [8],
                unlocks: []
            },
            {
                id: 12,
                name: "核心打击",
                score: 12,
                description: "对敌方指挥中心发动决定性攻击",
                dependencies: [3],
                unlocks: []
            }
        ];

        // 游戏状态
        let gameState = {
            playerScore: 0,
            aiScore: 0,
            playerStrategies: [],
            aiStrategies: [],
            currentTurn: 'player', // 'player' or 'ai'
            gameActive: false,
            round: 1,
            firstTurn: 'player' // 记录首轮先手方
        };

        // 初始化游戏
        function initGame() {
            createParticles();
            renderStrategies();
            updateUI();
            addLog("游戏初始化完成，点击'开始游戏'开始对战！");
        }

        // 调试函数 - 在浏览器控制台中输入 debugGame() 查看当前状态
        window.debugGame = function() {
            console.log('=== 游戏调试信息 ===');
            console.log('游戏状态:', gameState);
            console.log('可用策略(玩家):', strategies.filter(s => isStrategyAvailable(s.id, 'player')).map(s => s.name));
            console.log('可用策略(AI):', strategies.filter(s => isStrategyAvailable(s.id, 'ai')).map(s => s.name));
            console.log('===================');
            return gameState;
        };

        // 开始游戏
        function startGame() {
            // 显示战前准备模态框
            document.getElementById('preBattleModal').style.display = 'block';
            document.getElementById('startRandomBtn').style.display = 'inline-block';
            document.getElementById('randomResult').style.display = 'none';
            
            // 重置进度条
            document.getElementById('randomProgress').style.width = '0%';
            
            // 重置事件卡片状态
            document.querySelectorAll('.battle-event').forEach(event => {
                event.classList.remove('active', 'winner');
            });
        }

        // 开始随机选择
        function startRandomSelection() {
            document.getElementById('startRandomBtn').style.display = 'none';
            
            // 随机选择一个事件作为胜利事件
            const randomEventIndex = Math.floor(Math.random() * battleEvents.length);
            const winningEvent = battleEvents[randomEventIndex];
            
            // 随机决定胜利方 (50% 概率)
            const isPlayerWin = Math.random() < 0.5;
            
            addLog("🎯 战前准备阶段开始，双方正在争夺先手权...");
            
            // 动画效果：依次激活事件
            let currentIndex = 0;
            const animationInterval = setInterval(() => {
                // 重置所有事件状态
                document.querySelectorAll('.battle-event').forEach(event => {
                    event.classList.remove('active');
                });
                
                // 激活当前事件
                const events = document.querySelectorAll('.battle-event');
                if (events[currentIndex]) {
                    events[currentIndex].classList.add('active');
                }
                
                // 更新进度条
                const progress = ((currentIndex + 1) / events.length) * 100;
                document.getElementById('randomProgress').style.width = progress + '%';
                
                currentIndex = (currentIndex + 1) % events.length;
            }, 300);

            // 3秒后显示结果
            setTimeout(() => {
                clearInterval(animationInterval);
                
                // 显示获胜事件
                document.querySelectorAll('.battle-event').forEach(event => {
                    event.classList.remove('active');
                });
                
                const winningEventElement = document.querySelector(`[data-event="${winningEvent.id}"]`);
                winningEventElement.classList.add('winner');
                
                // 更新进度条到100%
                document.getElementById('randomProgress').style.width = '100%';
                
                // 设置游戏首轮
                gameState.firstTurn = isPlayerWin ? 'player' : 'ai';
                gameState.currentTurn = gameState.firstTurn;
                
                // 显示结果
                const winnerTitle = document.getElementById('winnerTitle');
                const winnerDesc = document.getElementById('winnerDesc');
                
                if (isPlayerWin) {
                    winnerTitle.innerHTML = `🎉 ${winningEvent.name} - 玩家获胜！`;
                    winnerDesc.innerHTML = winningEvent.playerWinDesc;
                    addLog(`🎯 ${winningEvent.name}：${winningEvent.playerWinDesc}`);
                } else {
                    winnerTitle.innerHTML = `🤖 ${winningEvent.name} - AI获胜！`;
                    winnerDesc.innerHTML = winningEvent.aiWinDesc;
                    addLog(`🤖 ${winningEvent.name}：${winningEvent.aiWinDesc}`);
                }
                
                document.getElementById('randomResult').style.display = 'block';
                
            }, 3000);
        }

        // 开始战斗阶段
        function startBattlePhase() {
            document.getElementById('preBattleModal').style.display = 'none';
            
            // 初始化游戏状态
            gameState = {
                playerScore: 0,
                aiScore: 0,
                playerStrategies: [],
                aiStrategies: [],
                currentTurn: gameState.firstTurn,
                gameActive: true,
                round: 1,
                firstTurn: gameState.firstTurn
            };
            
            updateUI();
            renderStrategies();
            
            const firstPlayer = gameState.firstTurn === 'player' ? '玩家' : 'AI';
            addLog(`⚔️ 战斗阶段开始！${firstPlayer}获得先手优势！`);
            
            // 如果AI先手，立即开始AI回合
            if (gameState.currentTurn === 'ai') {
                setTimeout(() => {
                    aiMakeDecision();
                }, 1000);
            }
        }

        // 重置游戏
        function resetGame() {
            gameState = {
                playerScore: 0,
                aiScore: 0,
                playerStrategies: [],
                aiStrategies: [],
                currentTurn: 'player',
                gameActive: false,
                round: 1,
                firstTurn: 'player'
            };
            updateUI();
            renderStrategies();
            document.getElementById('gameLog').innerHTML = '';
            addLog("🔄 游戏已重置");
        }

        // 渲染策略卡片
        function renderStrategies() {
            const container = document.getElementById('strategiesContainer');
            container.innerHTML = '';

            strategies.forEach(strategy => {
                const card = document.createElement('div');
                card.className = 'strategy-card';
                card.id = `strategy-${strategy.id}`;

                // 检查策略状态
                const isPlayerSelected = gameState.playerStrategies.includes(strategy.id);
                const isAiSelected = gameState.aiStrategies.includes(strategy.id);
                const isAvailable = isStrategyAvailable(strategy.id, 'player');

                if (isPlayerSelected) {
                    card.classList.add('selected-player');
                } else if (isAiSelected) {
                    card.classList.add('selected-ai');
                } else if (isAvailable && gameState.gameActive && gameState.currentTurn === 'player') {
                    card.classList.add('available');
                    card.onclick = () => selectStrategy(strategy.id);
                } else {
                    card.classList.add('unavailable');
                }

                card.innerHTML = `
                    <div class="strategy-header">
                        <div class="strategy-name">${strategy.name}</div>
                        <div class="strategy-score">${strategy.score}分</div>
                    </div>
                    <div class="strategy-description">${strategy.description}</div>
                    ${strategy.dependencies.length > 0 ? 
                        `<div class="strategy-dependencies">前置条件: ${strategy.dependencies.map(id => {
                            const depStrategy = strategies.find(s => s.id === id);
                            const playerHas = gameState.playerStrategies.includes(id);
                            const aiHas = gameState.aiStrategies.includes(id);
                            let status = '';
                            if (playerHas) status = ' ✓(你已选择)';
                            else if (aiHas) status = ' ✗(AI已选择)';
                            else status = ' ○(未选择)';
                            return depStrategy.name + status;
                        }).join(', ')}</div>` : ''}
                    ${isPlayerSelected ? '<div style="color: #FFD700;">✓ 玩家已选择</div>' : ''}
                    ${isAiSelected ? '<div style="color: #DC143C;">✓ AI已选择</div>' : ''}
                `;

                container.appendChild(card);
            });
        }

        // 检查策略是否可用
        function isStrategyAvailable(strategyId, forPlayer = null) {
            const strategy = strategies.find(s => s.id === strategyId);
            if (!strategy) return false;

            // 检查是否已被选择
            if (gameState.playerStrategies.includes(strategyId) || 
                gameState.aiStrategies.includes(strategyId)) {
                return false;
            }

            // 如果没有前置条件，则可用
            if (strategy.dependencies.length === 0) {
                return true;
            }

            // 确定检查哪一方的前置条件
            let playerToCheck = forPlayer;
            if (playerToCheck === null) {
                playerToCheck = gameState.currentTurn;
            }

            // 检查前置条件 - 只能基于当前玩家自己已选择的策略
            const relevantStrategies = playerToCheck === 'player' ? 
                gameState.playerStrategies : gameState.aiStrategies;

            return strategy.dependencies.every(depId => 
                relevantStrategies.includes(depId)
            );
        }

        // 玩家选择策略
        function selectStrategy(strategyId) {
            if (!gameState.gameActive) {
                addLog("❌ 游戏未激活");
                return;
            }
            
            if (gameState.currentTurn !== 'player') {
                addLog(`❌ 当前不是玩家回合，当前回合: ${gameState.currentTurn}`);
                return;
            }
            
            if (!isStrategyAvailable(strategyId, 'player')) {
                addLog("❌ 策略不可用");
                return;
            }

            const strategy = strategies.find(s => s.id === strategyId);
            gameState.playerStrategies.push(strategyId);
            gameState.playerScore += strategy.score;

            // 检查解锁的策略
            const unlockedStrategies = strategy.unlocks || [];
            let unlockMessage = '';
            if (unlockedStrategies.length > 0) {
                const unlockNames = unlockedStrategies.map(id => strategies.find(s => s.id === id).name);
                unlockMessage = ` (解锁了: ${unlockNames.join(', ')})`;
            }

            addLog(`🎯 玩家选择了"${strategy.name}"，获得${strategy.score}分${unlockMessage}`);
            
            updateUI();
            renderStrategies();

            // 检查游戏是否结束
            if (gameState.playerStrategies.length >= 6) {
                endGame();
                return;
            }

            // 切换到AI回合
            gameState.currentTurn = 'ai';
            addLog("🤖 切换到AI回合...");
            updateUI();
            
            setTimeout(() => {
                aiMakeDecision();
            }, 1000);
        }

        // AI做决策 - 修改为调用PHP后端
        async function aiMakeDecision() {
            if (!gameState.gameActive || gameState.currentTurn !== 'ai') {
                console.log('AI决策条件不满足:', gameState.gameActive, gameState.currentTurn);
                return;
            }

            document.getElementById('aiThinking').style.display = 'block';
            addLog("🤖 AI正在分析战况...");

            try {
                const availableStrategies = strategies.filter(s => isStrategyAvailable(s.id, 'ai'));
                
                if (availableStrategies.length === 0) {
                    addLog("❌ AI无可用策略，跳过回合");
                    document.getElementById('aiThinking').style.display = 'none';
                    endTurn();
                    return;
                }

                addLog(`🔍 AI正在从${availableStrategies.length}个可用策略中选择...`);
                const prompt = createAIPrompt(availableStrategies);
                
                // 调用PHP后端
                const response = await fetch('game.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        prompt: prompt
                    })
                });

                if (!response.ok) {
                    throw new Error(`服务器响应错误: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                const choice = parseAIResponse(data.content, availableStrategies);

                if (choice) {
                    gameState.aiStrategies.push(choice.id);
                    gameState.aiScore += choice.score;
                    
                    // 检查解锁的策略
                    const unlockedStrategies = choice.unlocks || [];
                    let unlockMessage = '';
                    if (unlockedStrategies.length > 0) {
                        const unlockNames = unlockedStrategies.map(id => strategies.find(s => s.id === id).name);
                        unlockMessage = ` (解锁了: ${unlockNames.join(', ')})`;
                    }
                    
                    addLog(`🤖 AI选择了"${choice.name}"，获得${choice.score}分${unlockMessage}`);
                } else {
                    // 如果AI响应解析失败，随机选择
                    addLog("⚠️ AI响应解析失败，随机选择策略");
                    const randomChoice = availableStrategies[Math.floor(Math.random() * availableStrategies.length)];
                    gameState.aiStrategies.push(randomChoice.id);
                    gameState.aiScore += randomChoice.score;
                    
                    // 检查解锁的策略
                    const unlockedStrategies = randomChoice.unlocks || [];
                    let unlockMessage = '';
                    if (unlockedStrategies.length > 0) {
                        const unlockNames = unlockedStrategies.map(id => strategies.find(s => s.id === id).name);
                        unlockMessage = ` (解锁了: ${unlockNames.join(', ')})`;
                    }
                    
                    addLog(`🤖 AI选择了"${randomChoice.name}"，获得${randomChoice.score}分${unlockMessage}`);
                }

            } catch (error) {
                console.error('AI决策失败:', error);
                addLog(`❌ AI决策失败: ${error.message}，随机选择策略`);
                
                // 降级到随机选择
                const availableStrategies = strategies.filter(s => isStrategyAvailable(s.id, 'ai'));
                if (availableStrategies.length > 0) {
                    const randomChoice = availableStrategies[Math.floor(Math.random() * availableStrategies.length)];
                    gameState.aiStrategies.push(randomChoice.id);
                    gameState.aiScore += randomChoice.score;
                    
                    // 检查解锁的策略
                    const unlockedStrategies = randomChoice.unlocks || [];
                    let unlockMessage = '';
                    if (unlockedStrategies.length > 0) {
                        const unlockNames = unlockedStrategies.map(id => strategies.find(s => s.id === id).name);
                        unlockMessage = ` (解锁了: ${unlockNames.join(', ')})`;
                    }
                    
                    addLog(`🤖 AI选择了"${randomChoice.name}"，获得${randomChoice.score}分${unlockMessage}`);
                } else {
                    addLog("❌ AI完全无策略可选");
                }
            } finally {
                document.getElementById('aiThinking').style.display = 'none';
                
                // 统一在这里处理游戏流程
                updateUI();
                renderStrategies();

                // 检查游戏是否结束
                if (gameState.aiStrategies.length >= 6) {
                    endGame();
                    return;
                }

                // 确保切换回玩家回合
                endTurn();
            }
        }

        // 创建AI提示
        function createAIPrompt(availableStrategies) {
            const gameContext = `
当前游戏状态：
- 轮次: ${gameState.round}
- 玩家已选策略: ${gameState.playerStrategies.map(id => {
    const s = strategies.find(strategy => strategy.id === id);
    return `${s.name}(${s.score}分)`;
}).join(', ') || '无'}
- 玩家当前得分: ${gameState.playerScore}
- AI已选策略: ${gameState.aiStrategies.map(id => {
    const s = strategies.find(strategy => strategy.id === id);
    return `${s.name}(${s.score}分)`;
}).join(', ') || '无'}
- AI当前得分: ${gameState.aiScore}

重要规则：只有你（AI）自己选择了前置条件策略，才能选择依赖该条件的策略。玩家选择的策略不能作为你的前置条件。

你当前可选择的策略:
${availableStrategies.map(s => {
    let depInfo = '';
    if (s.dependencies.length > 0) {
        const depNames = s.dependencies.map(id => strategies.find(st => st.id === id).name);
        const hasAllDeps = s.dependencies.every(depId => gameState.aiStrategies.includes(depId));
        depInfo = ` (需要前置: ${depNames.join(', ')} - ${hasAllDeps ? '✓已满足' : '✗未满足'})`;
    }
    return `${s.id}. ${s.name} - ${s.score}分 - ${s.description}${depInfo}`;
}).join('\n')}

全部策略的依赖关系参考:
${strategies.map(s => {
    const unlockInfo = s.unlocks && s.unlocks.length > 0 ? 
        ` → 解锁[${s.unlocks.map(id => strategies.find(st => st.id === id).name).join(', ')}]` : '';
    return `${s.name}(${s.score}分)${unlockInfo}`;
}).join('\n')}

请作为一个聪明的AI战略家，分析当前局势并选择最优策略。考虑以下因素：
1. 当前得分差距 (${gameState.aiScore - gameState.playerScore > 0 ? '你领先' : '你落后'}${Math.abs(gameState.aiScore - gameState.playerScore)}分)
2. 剩余回合数 (还能选择${6 - gameState.aiStrategies.length}个策略)
3. 策略的性价比和即时收益
4. 是否选择前置策略为后续高分策略铺路
5. 时机把握：是否应该抢占关键前置条件

请直接回答策略的ID数字，只回答数字，不要其他内容。
`;

            return gameContext;
        }

        // 解析AI响应
        function parseAIResponse(response, availableStrategies) {
            const choiceId = parseInt(response.match(/\d+/)?.[0]);
            return availableStrategies.find(s => s.id === choiceId);
        }

        // 结束回合
        function endTurn() {
            gameState.currentTurn = 'player';
            gameState.round++;
            addLog(`🔄 第${gameState.round}轮开始，轮到玩家选择策略`);
            updateUI();
            renderStrategies();
        }

        // 结束游戏
        function endGame() {
            gameState.gameActive = false;
            
            let result = '';
            if (gameState.playerScore > gameState.aiScore) {
                result = '🎉 恭喜！你获得了胜利！';
            } else if (gameState.aiScore > gameState.playerScore) {
                result = '😔 AI获得了胜利！再接再厉！';
            } else {
                result = '🤝 平局！势均力敌的对决！';
            }

            document.getElementById('gameResult').innerHTML = result;
            document.getElementById('finalScores').innerHTML = `
                <h3>最终得分</h3>
                <p>玩家: ${gameState.playerScore}分</p>
                <p>AI: ${gameState.aiScore}分</p>
                <p>首轮先手: ${gameState.firstTurn === 'player' ? '玩家' : 'AI'}</p>
            `;
            
            document.getElementById('gameEndModal').style.display = 'block';
            addLog(`🏁 游戏结束！${result}`);
        }

        // 更新UI
        function updateUI() {
            document.getElementById('playerScore').textContent = gameState.playerScore;
            document.getElementById('aiScore').textContent = gameState.aiScore;
            document.getElementById('playerCount').textContent = gameState.playerStrategies.length;
            document.getElementById('aiCount').textContent = gameState.aiStrategies.length;

            let turnText = '';
            if (!gameState.gameActive) {
                turnText = '游戏结束';
            } else if (gameState.currentTurn === 'player') {
                turnText = '🎯 你的回合';
            } else if (gameState.currentTurn === 'ai') {
                turnText = '🤖 AI思考中...';
            }
            
            document.getElementById('turnIndicator').textContent = turnText;

            // 更新已选策略显示
            updateSelectedStrategies();
            
            // 调试信息 - 可以在浏览器控制台中查看
            console.log('游戏状态更新:', {
                round: gameState.round,
                currentTurn: gameState.currentTurn,
                gameActive: gameState.gameActive,
                playerScore: gameState.playerScore,
                aiScore: gameState.aiScore,
                playerStrategies: gameState.playerStrategies,
                aiStrategies: gameState.aiStrategies,
                firstTurn: gameState.firstTurn
            });
        }

        // 更新已选策略显示
        function updateSelectedStrategies() {
            const playerDiv = document.getElementById('playerSelected');
            const aiDiv = document.getElementById('aiSelected');

            playerDiv.innerHTML = gameState.playerStrategies.map(id => {
                const strategy = strategies.find(s => s.id === id);
                return `<div class="selected-item">
                    <span>${strategy.name}</span>
                    <span>${strategy.score}分</span>
                </div>`;
            }).join('');

            aiDiv.innerHTML = gameState.aiStrategies.map(id => {
                const strategy = strategies.find(s => s.id === id);
                return `<div class="selected-item">
                    <span>${strategy.name}</span>
                    <span>${strategy.score}分</span>
                </div>`;
            }).join('');
        }

        // 添加日志
        function addLog(message) {
            const log = document.getElementById('gameLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('gameEndModal').style.display = 'none';
        }

        // 初始化游戏
        initGame();
    </script>
</body>
